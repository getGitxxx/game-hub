<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>国际象棋</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap');

        :root {
            color-scheme: light;
            --bg-top: #f6fbe5;
            --bg-bottom: #bfdc79;
            --shell: #f8fde7;
            --shell-border: #d2e78a;
            --card: rgba(255, 250, 233, 0.9);
            --text-main: #304213;
            --text-soft: #6d7f3b;
            --accent: #7ac70c;
            --accent-shadow: #58a700;
            --light-square: #fff6d6;
            --dark-square: #8ac739;
            --board-frame: #416217;
            --board-frame-top: #78aa27;
            --selected: rgba(255, 211, 84, 0.94);
            --last-move: rgba(255, 232, 136, 0.94);
            --check: rgba(255, 146, 101, 0.94);
            --move-dot: rgba(48, 66, 19, 0.28);
            --capture-ring: rgba(255, 248, 213, 0.94);
            --piece-white: #fff9e8;
            --piece-white-shade: #dce8a8;
            --piece-black: #4d6820;
            --piece-black-shade: #34470f;
            --piece-outline: #36510d;
            --shadow-lg: 0 24px 60px rgba(52, 86, 14, 0.18);
            --shadow-md: 0 14px 28px rgba(52, 86, 14, 0.12);
            --board-size: min(640px, calc(100vw - 56px));
            --square-size: calc(var(--board-size) / 8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            min-height: 100%;
        }

        body {
            font-family: 'Nunito', sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 32%),
                radial-gradient(circle at 86% 18%, rgba(132, 192, 46, 0.24), transparent 24%),
                radial-gradient(circle at 22% 82%, rgba(255, 239, 184, 0.46), transparent 22%),
                linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            padding: max(12px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        .page {
            min-height: calc(100vh - max(14px, env(safe-area-inset-bottom)));
            display: grid;
            place-items: center;
        }

        .app-shell {
            width: min(1120px, 100%);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.56), rgba(255, 255, 255, 0)),
                var(--shell);
            border: 1px solid var(--shell-border);
            border-radius: 30px;
            box-shadow: var(--shadow-lg);
            padding: 18px;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 18px;
            align-items: start;
        }

        .play-area,
        .side-panel {
            background: var(--card);
            border: 1px solid rgba(122, 167, 36, 0.22);
            border-radius: 26px;
            box-shadow: var(--shadow-md);
        }

        .play-area {
            padding: 18px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            padding: 0 14px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 800;
            color: var(--text-main);
            background: #eef7d2;
            box-shadow: inset 0 -3px 0 rgba(143, 177, 72, 0.85);
        }

        .brand {
            text-align: right;
        }

        .eyebrow {
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-soft);
        }

        h1 {
            font-size: clamp(1.5rem, 2.8vw, 2.3rem);
            line-height: 1;
            font-weight: 800;
        }

        .board-stage {
            width: 100%;
            display: grid;
            place-items: center;
            gap: 14px;
        }

        .captured-strip {
            width: min(100%, calc(var(--board-size) + 28px));
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .capture-card {
            min-height: 68px;
            padding: 10px 12px;
            border-radius: 20px;
            background: rgba(255, 252, 236, 0.94);
            border: 1px solid rgba(122, 167, 36, 0.18);
        }

        .capture-label {
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--text-soft);
            margin-bottom: 6px;
        }

        .captured-list {
            min-height: 28px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        .captured-list .piece {
            width: 34px;
            height: 34px;
            transform: none;
            filter:
                drop-shadow(0 3px 0 rgba(54, 81, 13, 0.06))
                drop-shadow(0 4px 4px rgba(54, 81, 13, 0.12));
        }

        .board-frame {
            width: min(100%, calc(var(--board-size) + 28px));
            aspect-ratio: 1;
            padding: 14px;
            border-radius: 30px;
            background:
                linear-gradient(180deg, var(--board-frame-top) 0%, var(--board-frame) 100%);
            box-shadow:
                inset 0 -5px 0 rgba(28, 42, 8, 0.34),
                inset 0 3px 0 rgba(236, 249, 192, 0.42),
                0 16px 28px rgba(52, 86, 14, 0.18);
        }

        #chessboard {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            overflow: hidden;
            border-radius: 22px;
            background: #edf5c8;
            position: relative;
            box-shadow: inset 0 0 0 4px rgba(54, 81, 13, 0.16);
        }

        .square {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            user-select: none;
            cursor: pointer;
        }

        .square.light {
            background: linear-gradient(180deg, #fff9e0 0%, var(--light-square) 100%);
        }

        .square.dark {
            background: linear-gradient(180deg, #9dd84d 0%, var(--dark-square) 100%);
        }

        .square.selected {
            background: var(--selected) !important;
        }

        .square.last-move {
            background: var(--last-move) !important;
        }

        .square.in-check {
            background: var(--check) !important;
        }

        .square.valid-move::after {
            content: "";
            position: absolute;
            width: calc(var(--square-size) * 0.22);
            height: calc(var(--square-size) * 0.22);
            border-radius: 50%;
            background: var(--move-dot);
            box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.18);
        }

        .square.valid-move.has-piece::after {
            width: calc(var(--square-size) * 0.78);
            height: calc(var(--square-size) * 0.78);
            background: transparent;
            border: 5px solid var(--capture-ring);
            box-shadow: none;
        }

        .piece {
            position: relative;
            z-index: 1;
            width: calc(var(--square-size) * 0.82);
            height: calc(var(--square-size) * 0.82);
            display: block;
            pointer-events: none;
            transform: translateY(-4%);
            filter:
                drop-shadow(0 4px 0 rgba(54, 81, 13, 0.08))
                drop-shadow(0 8px 10px rgba(54, 81, 13, 0.18));
        }

        .piece.white {
            --piece-fill: var(--piece-white);
            --piece-shade: var(--piece-white-shade);
            --piece-stroke: var(--piece-outline);
            --piece-gloss: rgba(255, 255, 255, 0.88);
            --piece-shadow-fill: rgba(54, 81, 13, 0.14);
        }

        .piece.black {
            --piece-fill: var(--piece-black);
            --piece-shade: var(--piece-black-shade);
            --piece-stroke: #223607;
            --piece-gloss: rgba(209, 236, 143, 0.28);
            --piece-shadow-fill: rgba(22, 33, 7, 0.24);
        }

        .piece-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .piece-svg .piece-shadow {
            fill: var(--piece-shadow-fill);
        }

        .piece-svg .piece-main,
        .piece-svg .piece-base {
            stroke: var(--piece-stroke);
            stroke-width: 3.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .piece-svg .piece-main {
            fill: var(--piece-fill);
        }

        .piece-svg .piece-base {
            fill: var(--piece-shade);
        }

        .piece-svg .piece-shade {
            fill: var(--piece-shade);
            opacity: 0.95;
        }

        .piece-svg .piece-highlight {
            fill: var(--piece-gloss);
        }

        .piece-svg .piece-detail {
            fill: none;
            stroke: var(--piece-stroke);
            stroke-width: 3.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .piece-svg .piece-mark {
            fill: var(--piece-stroke);
        }

        .side-panel {
            padding: 18px;
            display: grid;
            gap: 14px;
        }

        .status-card,
        .controls-card,
        .history-card {
            background: rgba(255, 253, 240, 0.94);
            border: 1px solid rgba(122, 167, 36, 0.18);
            border-radius: 20px;
            padding: 14px;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .status-title {
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-soft);
        }

        .turn-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 999px;
            background: #eef7d2;
            box-shadow: inset 0 -4px 0 rgba(143, 177, 72, 0.55);
            font-weight: 800;
        }

        .turn-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(54, 81, 13, 0.56);
            background: #fffdf0;
        }

        .turn-dot.black-turn {
            background: #4d6820;
        }

        .status-message {
            margin-top: 12px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 12px;
            border-radius: 16px;
            background: #f1f8dc;
            color: var(--text-soft);
            font-weight: 800;
            text-align: center;
        }

        .status-message.alert {
            color: #8a4d1b;
            background: #ffe2b8;
        }

        .status-message.success {
            color: #2e6b18;
            background: #daf0b7;
        }

        .controls-card {
            display: grid;
            gap: 10px;
        }

        .control-group {
            display: grid;
            gap: 8px;
        }

        .control-label {
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-soft);
        }

        .segmented-control {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .segmented-btn {
            min-height: 44px;
            border: none;
            border-radius: 14px;
            font: inherit;
            font-weight: 800;
            color: var(--text-main);
            background: #edf7d0;
            box-shadow: inset 0 -4px 0 #c7df91;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease, opacity 0.15s ease;
        }

        .segmented-btn.is-active {
            color: #ffffff;
            background: var(--accent);
            box-shadow: inset 0 -4px 0 var(--accent-shadow);
        }

        .segmented-btn:disabled {
            cursor: not-allowed;
            opacity: 0.45;
            filter: grayscale(0.15);
        }

        .mode-hint {
            min-height: 20px;
            color: var(--text-soft);
            font-size: 0.84rem;
            line-height: 1.4;
        }

        .btn {
            min-height: 50px;
            border: none;
            border-radius: 16px;
            font: inherit;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
        }

        .btn:active {
            transform: translateY(1px) scale(0.995);
        }

        .btn-primary {
            color: #ffffff;
            background: var(--accent);
            box-shadow: inset 0 -4px 0 var(--accent-shadow);
        }

        .btn-secondary {
            color: var(--text-main);
            background: #eef7d2;
            box-shadow: inset 0 -4px 0 #c7df91;
        }

        .btn-danger {
            color: var(--text-main);
            background: #dceeb5;
            box-shadow: inset 0 -4px 0 #a9ca63;
        }

        .history-card {
            min-height: 0;
        }

        .section-title {
            margin-bottom: 10px;
            font-size: 0.95rem;
            font-weight: 800;
        }

        .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 280px;
            overflow: auto;
            padding-right: 2px;
        }

        .move {
            padding: 7px 10px;
            border-radius: 999px;
            background: #edf7d0;
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.92rem;
            white-space: nowrap;
        }

        .helper-text {
            color: var(--text-soft);
            font-size: 0.88rem;
            line-height: 1.4;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(57, 82, 17, 0.36);
            backdrop-filter: blur(8px);
            z-index: 20;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            width: min(420px, 100%);
            border-radius: 24px;
            background: #fbfde8;
            border: 1px solid rgba(122, 167, 36, 0.4);
            box-shadow: var(--shadow-lg);
            padding: 20px;
            text-align: center;
        }

        .modal-content h3 {
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .promotion-pieces {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 14px;
        }

        .promotion-piece {
            min-height: 74px;
            display: grid;
            place-items: center;
            border: none;
            border-radius: 18px;
            background: #edf7d0;
            box-shadow: inset 0 -4px 0 #c7df91;
            font-size: 1rem;
            cursor: pointer;
        }

        .promotion-piece .piece {
            width: 52px;
            height: 52px;
            transform: none;
        }

        @media (hover: hover) {
            .btn:hover,
            .promotion-piece:hover,
            .back-link:hover {
                filter: brightness(0.98);
                transform: translateY(-1px);
            }
        }

        @media (max-width: 980px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .side-panel {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                align-items: start;
            }

            .history-card {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 720px) {
            .app-shell {
                padding: 12px;
                border-radius: 24px;
            }

            .play-area,
            .side-panel {
                border-radius: 22px;
                padding: 14px;
            }

            .topbar {
                margin-bottom: 10px;
            }

            .side-panel {
                grid-template-columns: 1fr;
            }

            .captured-strip {
                gap: 8px;
            }

            .capture-card {
                min-height: 62px;
                padding: 9px 10px;
            }
        }

        @media (max-width: 420px) {
            body {
                padding-inline: 10px;
            }

            .topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .brand {
                text-align: left;
            }

            .back-link {
                justify-content: center;
            }

            .board-frame {
                width: min(100%, calc(var(--board-size) + 18px));
                padding: 9px;
                border-radius: 24px;
            }

            #chessboard {
                border-radius: 18px;
            }

            .piece {
                width: calc(var(--square-size) * 0.84);
                height: calc(var(--square-size) * 0.84);
            }

            .promotion-piece {
                min-height: 64px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="app-shell">
            <div class="layout">
                <main class="play-area">
                    <div class="topbar">
                        <a href="index.html" class="back-link">← 返回</a>
                        <div class="brand">
                            <div class="eyebrow">Modern Chess</div>
                            <h1>国际象棋</h1>
                        </div>
                    </div>

                    <div class="board-stage">
                        <div class="captured-strip">
                            <section class="capture-card">
                                <div class="capture-label">黑方被吃</div>
                                <div class="captured-list" id="capturedBlack"></div>
                            </section>
                            <section class="capture-card">
                                <div class="capture-label">白方被吃</div>
                                <div class="captured-list" id="capturedWhite"></div>
                            </section>
                        </div>

                        <div class="board-frame">
                            <div id="chessboard" aria-label="国际象棋棋盘"></div>
                        </div>
                    </div>
                </main>

                <aside class="side-panel">
                    <section class="status-card">
                        <div class="status-row">
                            <div>
                                <div class="status-title">当前回合</div>
                                <div class="helper-text">点击棋子后再点击目标格移动，支持升变、悔棋和翻转。</div>
                            </div>
                            <div class="turn-badge">
                                <span class="turn-dot" id="turnDot"></span>
                                <span id="turnText">白方</span>
                            </div>
                        </div>
                        <div class="status-message" id="statusMessage">等待白方先手</div>
                    </section>

                    <section class="controls-card">
                        <div class="control-group">
                            <div class="control-label">对战模式</div>
                            <div class="segmented-control">
                                <button class="segmented-btn is-active" id="modeHumanBtn" type="button">双人对战</button>
                                <button class="segmented-btn" id="modeAiBtn" type="button">AI 对战</button>
                            </div>
                        </div>
                        <div class="control-group">
                            <div class="control-label">执棋方</div>
                            <div class="segmented-control">
                                <button class="segmented-btn is-active" id="playWhiteBtn" type="button">执白</button>
                                <button class="segmented-btn" id="playBlackBtn" type="button">执黑</button>
                            </div>
                        </div>
                        <div class="mode-hint" id="modeHint">当前为双人对战，双方都可直接操作棋盘。</div>
                        <button class="btn btn-primary" id="newGameBtn" type="button">新游戏</button>
                        <button class="btn btn-secondary" id="undoBtn" type="button">悔棋</button>
                        <button class="btn btn-danger" id="flipBtn" type="button">翻转棋盘</button>
                    </section>

                    <section class="history-card">
                        <div class="section-title">走棋记录</div>
                        <div class="moves-list" id="movesList"></div>
                    </section>
                </aside>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="promotionModal">
        <div class="modal-content">
            <h3>选择升变棋子</h3>
            <div class="helper-text">兵到达底线后可升变为后、车、象或马。</div>
            <div class="promotion-pieces" id="promotionPieces"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

        let game = new Chess();
        let selectedSquare = null;
        let validMoves = [];
        let lastMove = null;
        let isFlipped = false;
        let capturedPieces = { w: [], b: [] };
        let moveHistory = [];
        let pendingPromotion = null;
        let gameMode = "human";
        let humanColor = "w";
        let aiThinking = false;
        let aiTimer = null;
        let aiRequestId = 0;

        const boardEl = document.getElementById("chessboard");
        const turnDot = document.getElementById("turnDot");
        const turnText = document.getElementById("turnText");
        const statusMessage = document.getElementById("statusMessage");
        const movesList = document.getElementById("movesList");
        const capturedBlackEl = document.getElementById("capturedBlack");
        const capturedWhiteEl = document.getElementById("capturedWhite");
        const promotionModal = document.getElementById("promotionModal");
        const promotionPieces = document.getElementById("promotionPieces");
        const playAreaEl = document.querySelector(".play-area");
        const topbarEl = document.querySelector(".topbar");
        const capturedStripEl = document.querySelector(".captured-strip");
        const modeHint = document.getElementById("modeHint");
        const modeHumanBtn = document.getElementById("modeHumanBtn");
        const modeAiBtn = document.getElementById("modeAiBtn");
        const playWhiteBtn = document.getElementById("playWhiteBtn");
        const playBlackBtn = document.getElementById("playBlackBtn");

        const PIECE_VALUES = {
            p: 100,
            n: 320,
            b: 330,
            r: 500,
            q: 900,
            k: 20000
        };

        const CENTRAL_SQUARES = new Set(["d4", "e4", "d5", "e5"]);

        function isAiMode() {
            return gameMode === "ai";
        }

        function getAiColor() {
            return humanColor === "w" ? "b" : "w";
        }

        function isAITurn() {
            return isAiMode() && game.turn() === getAiColor();
        }

        function isInteractionLocked() {
            return pendingPromotion || aiThinking;
        }

        function cancelScheduledAiMove() {
            aiRequestId += 1;
            aiThinking = false;
            if (aiTimer) {
                clearTimeout(aiTimer);
                aiTimer = null;
            }
        }

        function createPieceElement(color, type) {
            const pieceEl = document.createElement("span");
            pieceEl.className = `piece ${color === "w" ? "white" : "black"} piece-${type}`;
            pieceEl.innerHTML = PIECE_SVGS[type] || "";
            pieceEl.setAttribute("aria-hidden", "true");
            return pieceEl;
        }

        function getSquareName(row, col) {
            const actualRow = isFlipped ? 7 - row : row;
            const actualCol = isFlipped ? 7 - col : col;
            return String.fromCharCode(97 + actualCol) + (8 - actualRow);
        }

        function setStatus(message, tone = "") {
            statusMessage.textContent = message;
            statusMessage.className = "status-message";
            if (tone) statusMessage.classList.add(tone);
        }

        function renderBoard() {
            boardEl.innerHTML = "";

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareName = getSquareName(row, col);
                    const squareEl = document.createElement("button");
                    const piece = game.get(squareName);

                    squareEl.type = "button";
                    squareEl.className = "square";
                    squareEl.classList.add((row + col) % 2 === 0 ? "light" : "dark");
                    squareEl.dataset.square = squareName;
                    squareEl.setAttribute("aria-label", squareName);

                    if (lastMove && (squareName === lastMove.from || squareName === lastMove.to)) {
                        squareEl.classList.add("last-move");
                    }

                    if (selectedSquare === squareName) {
                        squareEl.classList.add("selected");
                    }

                    if (validMoves.includes(squareName)) {
                        squareEl.classList.add("valid-move");
                        if (piece) squareEl.classList.add("has-piece");
                    }

                    if (piece && piece.type === "k" && game.in_check() && game.turn() === piece.color) {
                        squareEl.classList.add("in-check");
                    }

                    if (piece) {
                        const pieceEl = createPieceElement(piece.color, piece.type);
                        squareEl.appendChild(pieceEl);
                    }

                    squareEl.disabled = aiThinking;
                    squareEl.addEventListener("pointerup", (event) => {
                        event.preventDefault();
                        handleSquareClick(squareName);
                    });
                    boardEl.appendChild(squareEl);
                }
            }
        }

        function handleSquareClick(square) {
            if (isInteractionLocked()) return;

            const piece = game.get(square);
            const allowHumanMove = !isAiMode() || game.turn() === humanColor;

            if (!allowHumanMove) return;

            if (selectedSquare) {
                if (validMoves.includes(square)) {
                    const selectedPiece = game.get(selectedSquare);
                    if (selectedPiece && selectedPiece.type === "p") {
                        const targetRank = square[1];
                        if ((selectedPiece.color === "w" && targetRank === "8") ||
                            (selectedPiece.color === "b" && targetRank === "1")) {
                            showPromotionDialog(selectedSquare, square, selectedPiece.color);
                            return;
                        }
                    }
                    makeMove(selectedSquare, square);
                    return;
                }

                if (piece && piece.color === game.turn() && (!isAiMode() || piece.color === humanColor)) {
                    selectedSquare = square;
                    validMoves = game.moves({ square, verbose: true }).map((move) => move.to);
                    renderBoard();
                    return;
                }

                selectedSquare = null;
                validMoves = [];
                renderBoard();
                return;
            }

            if (piece && piece.color === game.turn() && (!isAiMode() || piece.color === humanColor)) {
                selectedSquare = square;
                validMoves = game.moves({ square, verbose: true }).map((move) => move.to);
                renderBoard();
            }
        }

        function refreshLastMove() {
            const history = game.history({ verbose: true });
            if (history.length === 0) {
                lastMove = null;
                return;
            }

            const previous = history[history.length - 1];
            lastMove = { from: previous.from, to: previous.to };
        }

        function rebuildCapturedPieces() {
            capturedPieces = { w: [], b: [] };
            const history = game.history({ verbose: true });

            history.forEach((move) => {
                if (move.captured) {
                    const capturedColor = move.color === "w" ? "b" : "w";
                    capturedPieces[capturedColor].push(move.captured);
                }
            });
        }

        function updateCapturedDisplay() {
            capturedWhiteEl.innerHTML = "";
            capturedBlackEl.innerHTML = "";

            capturedPieces.w.forEach((piece) => {
                capturedWhiteEl.appendChild(createPieceElement("w", piece));
            });

            capturedPieces.b.forEach((piece) => {
                capturedBlackEl.appendChild(createPieceElement("b", piece));
            });
        }

        function updateMoveHistory() {
            movesList.innerHTML = moveHistory.map((move, index) => {
                const moveNum = Math.floor(index / 2) + 1;
                return index % 2 === 0
                    ? `<span class="move">${moveNum}. ${move}</span>`
                    : `<span class="move">${move}</span>`;
            }).join("");
        }

        function updateTurnDisplay() {
            const whiteTurn = game.turn() === "w";
            turnDot.className = "turn-dot";
            if (!whiteTurn) turnDot.classList.add("black-turn");
            const sideText = whiteTurn ? "白方" : "黑方";

            if (isAiMode() && game.turn() === getAiColor()) {
                turnText.textContent = `${sideText} · AI`;
                return;
            }

            if (isAiMode() && game.turn() === humanColor) {
                turnText.textContent = `${sideText} · 你`;
                return;
            }

            turnText.textContent = sideText;
        }

        function evaluateBoardState(chess, aiColor) {
            if (chess.in_checkmate()) {
                return chess.turn() === aiColor ? -100000 : 100000;
            }

            if (chess.in_draw() || chess.in_stalemate() || chess.in_threefold_repetition() || chess.insufficient_material()) {
                return 0;
            }

            let score = 0;
            const boardState = chess.board();

            for (let row = 0; row < boardState.length; row++) {
                for (let col = 0; col < boardState[row].length; col++) {
                    const piece = boardState[row][col];
                    if (!piece) continue;

                    const square = String.fromCharCode(97 + col) + (8 - row);
                    const baseValue = PIECE_VALUES[piece.type] || 0;
                    const sign = piece.color === aiColor ? 1 : -1;
                    score += sign * baseValue;

                    if (piece.type !== "k") {
                        const distanceFromCenter = Math.abs(3.5 - row) + Math.abs(3.5 - col);
                        score += sign * Math.round((4.5 - distanceFromCenter) * 6);
                    }

                    if (CENTRAL_SQUARES.has(square)) {
                        score += sign * 18;
                    }
                }
            }

            const mobility = chess.moves().length;
            score += (chess.turn() === aiColor ? 1 : -1) * mobility * 2;

            if (chess.in_check()) {
                score += chess.turn() === aiColor ? -35 : 35;
            }

            return score;
        }

        function evaluateMoveCandidate(move, aiColor) {
            let score = 0;

            if (move.captured) {
                score += (PIECE_VALUES[move.captured] || 0) * 1.25 - (PIECE_VALUES[move.piece] || 0) * 0.05;
            }

            if (move.promotion) {
                score += (PIECE_VALUES[move.promotion] || 0) - PIECE_VALUES.p;
            }

            if (move.flags.includes("k") || move.flags.includes("q")) {
                score += 45;
            }

            if (CENTRAL_SQUARES.has(move.to)) {
                score += 20;
            }

            const next = new Chess(game.fen());
            next.move({ from: move.from, to: move.to, promotion: move.promotion });
            score += evaluateBoardState(next, aiColor);

            return score;
        }

        function chooseBestAiMove() {
            const aiColor = getAiColor();
            const moves = game.moves({ verbose: true });

            if (!moves.length) return null;

            let bestScore = -Infinity;
            let bestMove = null;

            moves.forEach((move) => {
                const replyPosition = new Chess(game.fen());
                replyPosition.move({ from: move.from, to: move.to, promotion: move.promotion });

                let moveScore = evaluateMoveCandidate(move, aiColor);
                const replies = replyPosition.moves({ verbose: true });

                if (replies.length) {
                    let worstReply = Infinity;

                    replies.forEach((reply) => {
                        const response = new Chess(replyPosition.fen());
                        response.move({ from: reply.from, to: reply.to, promotion: reply.promotion });
                        const responseScore = evaluateBoardState(response, aiColor);
                        worstReply = Math.min(worstReply, responseScore);
                    });

                    moveScore += worstReply * 0.92;
                }

                if (moveScore > bestScore || (moveScore === bestScore && Math.random() > 0.5)) {
                    bestScore = moveScore;
                    bestMove = move;
                }
            });

            return bestMove;
        }

        function updateModeControls() {
            modeHumanBtn.classList.toggle("is-active", gameMode === "human");
            modeAiBtn.classList.toggle("is-active", gameMode === "ai");
            playWhiteBtn.classList.toggle("is-active", humanColor === "w");
            playBlackBtn.classList.toggle("is-active", humanColor === "b");
            playWhiteBtn.disabled = gameMode === "human";
            playBlackBtn.disabled = gameMode === "human";

            if (gameMode === "human") {
                modeHint.textContent = "当前为双人对战，双方都可直接操作棋盘。";
                return;
            }

            modeHint.textContent = humanColor === "w"
                ? "当前为 AI 对战，你执白先手，AI 执黑。"
                : "当前为 AI 对战，你执黑后手，AI 会自动先走白棋。";
        }

        function scheduleAiMove() {
            cancelScheduledAiMove();

            if (!isAITurn() || game.game_over()) {
                syncView();
                return;
            }

            aiThinking = true;
            selectedSquare = null;
            validMoves = [];
            syncView();
            setStatus("AI 思考中…", "alert");

            const requestId = aiRequestId;
            aiTimer = window.setTimeout(() => {
                aiTimer = null;

                if (requestId !== aiRequestId || !isAITurn() || game.game_over()) {
                    aiThinking = false;
                    syncView();
                    return;
                }

                const move = chooseBestAiMove();
                aiThinking = false;

                if (!move) {
                    syncView();
                    return;
                }

                makeMove(move.from, move.to, move.promotion, true);
            }, 420);
        }

        function setGameMode(nextMode) {
            if (gameMode === nextMode) return;
            gameMode = nextMode;
            newGame();
        }

        function setHumanColor(nextColor) {
            if (humanColor === nextColor) return;
            humanColor = nextColor;

            if (isAiMode()) {
                newGame();
                return;
            }

            updateModeControls();
        }

        function checkGameStatus() {
            if (game.in_checkmate()) {
                const winner = game.turn() === "w" ? "黑方" : "白方";
                setStatus(`将死，${winner}获胜`, "success");
                return;
            }

            if (game.in_draw()) {
                if (game.in_stalemate()) {
                    setStatus("逼和，双方和棋", "alert");
                    return;
                }
                if (game.in_threefold_repetition()) {
                    setStatus("三次重复局面，和棋", "alert");
                    return;
                }
                if (game.insufficient_material()) {
                    setStatus("子力不足，和棋", "alert");
                    return;
                }
                setStatus("和棋", "alert");
                return;
            }

            if (game.in_check()) {
                const player = game.turn() === "w" ? "白方" : "黑方";
                setStatus(`${player}被将军`, "alert");
                return;
            }

            const player = game.turn() === "w" ? "白方" : "黑方";
            setStatus(`轮到${player}走棋`);
        }

        function syncView() {
            moveHistory = game.history();
            updateModeControls();
            rebuildCapturedPieces();
            refreshLastMove();
            renderBoard();
            updateTurnDisplay();
            updateCapturedDisplay();
            updateMoveHistory();
            checkGameStatus();
        }

        function makeMove(from, to, promotion = null, skipAiSchedule = false) {
            const move = game.move(promotion ? { from, to, promotion } : { from, to });
            if (!move) return;

            selectedSquare = null;
            validMoves = [];
            pendingPromotion = null;
            syncView();

            if (!skipAiSchedule && isAITurn() && !game.game_over()) {
                scheduleAiMove();
            }
        }

        function showPromotionDialog(from, to, color) {
            pendingPromotion = { from, to, color };
            promotionPieces.innerHTML = "";
            const options = color === "w" ? ["Q", "R", "B", "N"] : ["q", "r", "b", "n"];

            options.forEach((piece) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "promotion-piece";
                button.appendChild(createPieceElement(color, piece.toLowerCase()));
                button.addEventListener("click", () => {
                    promotionModal.classList.remove("show");
                    makeMove(from, to, piece.toLowerCase());
                });
                promotionPieces.appendChild(button);
            });

            promotionModal.classList.add("show");
        }

        function undoMove() {
            if (!game.history().length || pendingPromotion) return;

            cancelScheduledAiMove();
            game.undo();

            if (isAiMode() && game.history().length && game.turn() !== humanColor) {
                game.undo();
            }

            selectedSquare = null;
            validMoves = [];
            syncView();

            if (isAITurn() && !game.game_over()) {
                scheduleAiMove();
            }
        }

        function newGame() {
            cancelScheduledAiMove();
            game = new Chess();
            selectedSquare = null;
            validMoves = [];
            lastMove = null;
            capturedPieces = { w: [], b: [] };
            moveHistory = [];
            pendingPromotion = null;
            promotionModal.classList.remove("show");
            syncView();

            if (isAITurn()) {
                scheduleAiMove();
            }
        }

        function flipBoard() {
            isFlipped = !isFlipped;
            renderBoard();
        }

        function updateBoardSize() {
            const viewportWidth = document.documentElement.clientWidth;
            const viewportHeight = window.innerHeight;
            const playAreaStyles = getComputedStyle(playAreaEl);
            const playAreaPaddingX = parseFloat(playAreaStyles.paddingLeft) + parseFloat(playAreaStyles.paddingRight);
            const bodyPaddingX = viewportWidth <= 420 ? 20 : 28;
            const appShellPaddingX = viewportWidth <= 720 ? 24 : 36;
            const boardFrameExtra = viewportWidth <= 420 ? 18 : 28;
            const viewportWidthCap = viewportWidth - bodyPaddingX - appShellPaddingX - playAreaPaddingX - boardFrameExtra;
            const availableWidth = Math.min(
                640,
                viewportWidthCap,
                playAreaEl.clientWidth - playAreaPaddingX - boardFrameExtra
            );

            const topbarHeight = topbarEl.offsetHeight;
            const capturedHeight = capturedStripEl.offsetHeight;
            const verticalChrome = topbarHeight + capturedHeight + 150;
            const availableHeight = viewportHeight - verticalChrome;
            const nextBoardSize = Math.max(240, Math.min(availableWidth, availableHeight > 0 ? availableHeight : availableWidth));

            document.documentElement.style.setProperty("--board-size", `${Math.floor(nextBoardSize)}px`);
        }

        document.getElementById("undoBtn").addEventListener("click", undoMove);
        document.getElementById("newGameBtn").addEventListener("click", newGame);
        document.getElementById("flipBtn").addEventListener("click", flipBoard);
        modeHumanBtn.addEventListener("click", () => setGameMode("human"));
        modeAiBtn.addEventListener("click", () => setGameMode("ai"));
        playWhiteBtn.addEventListener("click", () => setHumanColor("w"));
        playBlackBtn.addEventListener("click", () => setHumanColor("b"));
        promotionModal.addEventListener("click", (event) => {
            if (event.target === promotionModal) {
                promotionModal.classList.remove("show");
                pendingPromotion = null;
            }
        });

        window.addEventListener("resize", updateBoardSize, { passive: true });
        updateBoardSize();
        syncView();
    </script>
</body>
</html>
