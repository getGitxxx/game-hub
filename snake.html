<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Orbitron', sans-serif;
            padding: 20px;
            touch-action: manipulation;
        }
        
        h1 {
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            letter-spacing: 4px;
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            width: 100%;
        }
        
        .score {
            color: #00ff88;
            font-size: 1rem;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .score span {
            color: #fff;
            font-weight: 700;
        }
        
        .high-score {
            color: #ffd700;
            font-size: 0.8rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .speed-indicator {
            color: #3498db;
            font-size: 0.8rem;
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }
        
        canvas {
            display: block;
            border-radius: 8px;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.5);
            max-width: 100%;
        }
        
        .controls {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        button {
            padding: 10px 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn-start {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }
        
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
        }
        
        .btn-reset {
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* Virtual D-Pad for mobile - centered */
        .dpad-container {
            display: none;
            margin-top: 20px;
            position: relative;
            width: 150px;
            height: 150px;
        }
        
        @media (max-width: 768px), (hover: none) {
            .dpad-container {
                display: block;
            }
        }
        
        .dpad-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #00ff88;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }
        
        .dpad-btn:active {
            background: rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
            transform: scale(0.95);
        }
        
        .dpad-up {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .dpad-down {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .dpad-left {
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .dpad-right {
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .dpad-btn:active.dpad-up {
            transform: translateX(-50%) scale(0.95);
        }
        
        .dpad-btn:active.dpad-down {
            transform: translateX(-50%) scale(0.95);
        }
        
        .dpad-btn:active.dpad-left {
            transform: translateY(-50%) scale(0.95);
        }
        
        .dpad-btn:active.dpad-right {
            transform: translateY(-50%) scale(0.95);
        }
        
        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .game-over-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .game-over-text {
            color: #e94560;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.8);
            animation: pulse 1s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .final-score {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        
        .instructions {
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            text-align: center;
            letter-spacing: 1px;
        }
        
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.75rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← 返回</a>
    
    <h1>SNAKE</h1>
    
    <div class="game-container">
        <div class="info-bar">
            <div class="score">分数: <span id="score">0</span></div>
            <div class="speed-indicator">速度: <span id="speed">1</span></div>
            <div class="high-score">最高: <span id="highScore">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="controls">
            <button class="btn-start" id="startBtn">开始</button>
            <button class="btn-reset" id="resetBtn">重置</button>
        </div>
        
        <!-- Virtual D-Pad for mobile - centered -->
        <div class="dpad-container" id="dpad">
            <div class="dpad-btn dpad-up" data-dir="up">↑</div>
            <div class="dpad-btn dpad-down" data-dir="down">↓</div>
            <div class="dpad-btn dpad-left" data-dir="left">←</div>
            <div class="dpad-btn dpad-right" data-dir="right">→</div>
        </div>
        
        <div class="instructions">键盘方向键 或 触屏虚拟按键控制</div>
    </div>
    
    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-text">游戏结束</div>
        <div class="final-score">得分: <span id="finalScore">0</span></div>
        <button class="btn-start" id="playAgainBtn">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const speedEl = document.getElementById('speed');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const dpad = document.getElementById('dpad');
        
        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        
        // Speed settings: start slow, speed up with food
        const BASE_SPEED = 200; // Initial interval (ms) - slower start
        const MIN_SPEED = 50;   // Fastest speed
        const SPEED_DECREASE = 5; // How much faster per food
        
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let isRunning = false;
        let currentSpeed = BASE_SPEED;
        
        highScoreEl.textContent = highScore;
        
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            currentSpeed = BASE_SPEED;
            scoreEl.textContent = score;
            speedEl.textContent = 1;
            spawnFood();
            draw();
        }
        
        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * TILE_COUNT);
                food.y = Math.floor(Math.random() * TILE_COUNT);
                validPosition = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            for (let i = 0; i < TILE_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
            
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * GRID_SIZE + GRID_SIZE / 2,
                    segment.y * GRID_SIZE + GRID_SIZE / 2,
                    0,
                    segment.x * GRID_SIZE + GRID_SIZE / 2,
                    segment.y * GRID_SIZE + GRID_SIZE / 2,
                    GRID_SIZE / 2
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    gradient.addColorStop(0, '#4ade80');
                    gradient.addColorStop(1, '#22c55e');
                }
                
                ctx.fillStyle = gradient;
                ctx.shadowColor = index === 0 ? '#00ff88' : '#22c55e';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2,
                    4
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            const foodGradient = ctx.createRadialGradient(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                0,
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2
            );
            foodGradient.addColorStop(0, '#ff6b6b');
            foodGradient.addColorStop(1, '#e94560');
            
            ctx.fillStyle = foodGradient;
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function update() {
            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                gameOver();
                return;
            }
            
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                
                // Speed up when eating food
                currentSpeed = Math.max(MIN_SPEED, currentSpeed - SPEED_DECREASE);
                speedEl.textContent = Math.floor((BASE_SPEED - currentSpeed) / SPEED_DECREASE) + 1;
                
                // Restart game loop with new speed
                clearInterval(gameLoop);
                gameLoop = setInterval(update, currentSpeed);
                
                spawnFood();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            gameLoop = null;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            
            finalScoreEl.textContent = score;
            gameOverOverlay.classList.add('show');
            startBtn.disabled = false;
        }
        
        function startGame() {
            if (isRunning) return;
            
            initGame();
            isRunning = true;
            startBtn.disabled = true;
            gameOverOverlay.classList.remove('show');
            
            gameLoop = setInterval(update, currentSpeed);
        }
        
        function resetGame() {
            isRunning = false;
            clearInterval(gameLoop);
            gameLoop = null;
            startBtn.disabled = false;
            gameOverOverlay.classList.remove('show');
            initGame();
        }
        
        function handleDirection(dir) {
            if (!isRunning) return;
            
            switch (dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowUp': 'up',
                'ArrowDown': 'down',
                'ArrowLeft': 'left',
                'ArrowRight': 'right'
            };
            
            if (keyMap[e.key]) {
                handleDirection(keyMap[e.key]);
                e.preventDefault();
            }
        });
        
        // Touch controls - D-Pad
        dpad.querySelectorAll('.dpad-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleDirection(btn.dataset.dir);
            });
            
            btn.addEventListener('click', (e) => {
                handleDirection(btn.dataset.dir);
            });
        });
        
        // Swipe controls on canvas
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    handleDirection(dx > 0 ? 'right' : 'left');
                } else {
                    handleDirection(dy > 0 ? 'down' : 'up');
                }
            }
        });
        
        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);
        playAgainBtn.addEventListener('click', () => {
            gameOverOverlay.classList.remove('show');
            startGame();
        });
        
        initGame();
    </script>
</body>
</html>
